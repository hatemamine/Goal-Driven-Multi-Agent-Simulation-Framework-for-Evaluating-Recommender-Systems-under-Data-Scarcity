dataset:
  name: mind_large
  mind_path: data/mind_large
  train_news_path: data/MINDlarge_train/news.tsv
  train_behaviors_path: data/MINDlarge_train/behaviors.tsv
  dev_news_path: data/MINDlarge_dev/news.tsv
  dev_behaviors_path: data/MINDlarge_dev/behaviors.tsv
  n_users: 1000000
  test_ratio: 0.2
  min_real_user_clicks: 5

ir:
  model: all-MiniLM-L6-v2
  index_path: data/faiss_large.index
  ids_path: data/corpus_ids_large.npy
  embeddings_path: data/embeddings_large.npy
  db_path: data/news_large.db
  batch_size: 512

simulation:
  sim_db_path: data/simulation_large.db
  slate_size: 5
  num_candidates: 20
  n_virtual_users: 1000
  n_sessions: 3
  parallel_workers: 8
  seed: 42
  max_virtual_users: 1000
  use_llm_persona: true

recommender:
  top_k: 10

ncf:
  emb_dim: 64
  epochs: 15
  batch_size: 512
  lr: 0.001

evaluation:
  k: 10
  replay_k: 10
  approach_b_k: 10
  n_ablation_sizes: [100, 500, 1000]
  min_real_user_clicks: 5
  test_ratio: 0.2
  seed: 42
