dataset:
  name: mind_small
  mind_path: data/mind_small
  train_news_path: data/MINDsmall_train/news.tsv
  train_behaviors_path: data/MINDsmall_train/behaviors.tsv
  dev_news_path: data/MINDsmall_dev/news.tsv
  dev_behaviors_path: data/MINDsmall_dev/behaviors.tsv
  n_users: 50000
  test_ratio: 0.2
  min_real_user_clicks: 5

ir:
  model: all-MiniLM-L6-v2
  index_path: data/faiss_small.index
  ids_path: data/corpus_ids_small.npy
  embeddings_path: data/embeddings_small.npy
  db_path: data/news_small.db
  batch_size: 512

simulation:
  sim_db_path: data/simulation_small.db
  slate_size: 5
  num_candidates: 20
  n_virtual_users: 100
  n_sessions: 3
  parallel_workers: 4
  seed: 42
  max_virtual_users: 100
  use_llm_persona: true

recommender:
  top_k: 10

ncf:
  emb_dim: 32
  epochs: 10
  batch_size: 256
  lr: 0.001

evaluation:
  k: 10
  replay_k: 10
  approach_b_k: 10
  n_ablation_sizes: [100, 500, 1000]
  min_real_user_clicks: 5
  test_ratio: 0.2
  seed: 42
